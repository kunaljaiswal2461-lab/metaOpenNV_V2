spec_version: 1
name: trading-env
version: 0.1.0
description: >
  RL Financial Market Simulator: trade SPY via OpenEnv-style REST (POST /reset, POST /step).
  There are 10 engineered market features per bar. JSON observations use market_features
  length WINDOW_SIZE*10 plus three portfolio fields; total flattened size is WINDOW_SIZE*10+3.
  Task presets set WINDOW_SIZE to 10, 20, or 50 (103 / 203 / 503). Default Space build uses
  WINDOW_SIZE=20 (203).
  Optional JSON body for reset: {"task_name":"spy_trading"|"risk_aware_trading"|"multi_horizon_trading"}.
  Actions: 0=HOLD, 1=BUY, 2=SELL.
server:
  type: docker
  build: ./server/Dockerfile
tasks:
  - name: spy_trading
    description: >
      A simple market environment to test basic agents.
    env_vars: {WINDOW_SIZE: '10'}
  - name: risk_aware_trading
    description: >
      Standard test for smart agents.
    env_vars: {WINDOW_SIZE: '20'}
  - name: multi_horizon_trading
    description: >
      Advanced test for deep agents with full history window.
    env_vars: {WINDOW_SIZE: '50'}
entrypoint:
  type: rest_api
  http:
    route: /reset, /step
observation_space:
  type: continuous
  # Canonical default for Space (WINDOW_SIZE=20, 10 features/bar + 3 portfolio).
  shape: [203]
action:
  type: discrete
